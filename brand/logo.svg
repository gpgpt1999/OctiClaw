<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <title>OctiClaw Logo</title>
  <desc>Cute red octopus mascot with the OctiClaw wordmark</desc>

  <defs>
    <!-- Main body gradient: bright coral to deep red -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
    <!-- Darker underside / shadow -->
    <linearGradient id="bodyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C92A36"/>
      <stop offset="100%" stop-color="#9B1B28"/>
    </linearGradient>
    <!-- Suction cup gradient -->
    <radialGradient id="suctionGrad" cx="35%" cy="35%">
      <stop offset="0%"   stop-color="#FFB3B3"/>
      <stop offset="100%" stop-color="#E05050"/>
    </radialGradient>
    <!-- Body shadow filter -->
    <filter id="bodyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1D3557" flood-opacity="0.18"/>
    </filter>
    <!-- Subtle glow for eyes -->
    <filter id="eyeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ======== OCTOPUS BODY (centered at 85, 62) ======== -->
  <g id="octopus" filter="url(#bodyShadow)">

    <!-- ── TENTACLES (drawn first, behind head) ── -->
    <!-- Each tentacle: thick stroke with rounded cap, slight curve outward -->
    <!-- The 8 tentacles radiate from bottom of body at angles 20° apart -->

    <!-- Tentacle 1: far left, pointing down-left -->
    <path d="M 62,72 Q 38,82 30,100 Q 24,112 18,118"
          fill="none" stroke="url(#bodyGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="18" cy="118" r="4" fill="#E63946"/>

    <!-- Tentacle 2 -->
    <path d="M 68,74 Q 48,90 44,106 Q 40,116 38,124"
          fill="none" stroke="url(#bodyGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="38" cy="124" r="4" fill="#E63946"/>

    <!-- Tentacle 3 -->
    <path d="M 76,76 Q 60,94 58,108 Q 57,116 56,124"
          fill="none" stroke="url(#bodyDark)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="56" cy="124" r="4" fill="#C92A36"/>

    <!-- Tentacle 4 -->
    <path d="M 85,77 Q 75,96 76,110 Q 77,120 80,128"
          fill="none" stroke="url(#bodyDark)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="80" cy="128" r="4" fill="#C92A36"/>

    <!-- Tentacle 5 -->
    <path d="M 94,76 Q 104,96 104,110 Q 104,120 102,128"
          fill="none" stroke="url(#bodyGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="102" cy="128" r="4" fill="#E63946"/>

    <!-- Tentacle 6 -->
    <path d="M 102,74 Q 118,90 118,106 Q 118,116 116,124"
          fill="none" stroke="url(#bodyGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="116" cy="124" r="4" fill="#E63946"/>

    <!-- Tentacle 7 -->
    <path d="M 108,72 Q 130,82 138,100 Q 142,112 148,118"
          fill="none" stroke="url(#bodyGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="148" cy="118" r="4" fill="#E63946"/>

    <!-- Tentacle 8: far right, pointing down-right (shorter, peeking out right) -->
    <path d="M 114,69 Q 136,78 144,90 Q 150,100 154,108"
          fill="none" stroke="url(#bodyGrad)" stroke-width="10" stroke-linecap="round"/>
    <circle cx="154" cy="108" r="4" fill="#E63946"/>

    <!-- ── BODY HEAD ── -->
    <!-- Main body ellipse, slightly wider than tall -->
    <ellipse cx="85" cy="52" rx="38" ry="34" fill="url(#bodyGrad)"/>
    <!-- Lower body shadow overlay -->
    <ellipse cx="85" cy="62" rx="34" ry="20" fill="url(#bodyDark)" opacity="0.22"/>
    <!-- Subtle highlight on top of head -->
    <ellipse cx="78" cy="30" rx="14" ry="8" fill="#FF9999" opacity="0.40"/>

    <!-- ── SUCTION CUPS on tentacles (decorative) ── -->
    <!-- Small circles along tentacle paths -->
    <circle cx="48"  cy="90"  r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="56"  cy="102" r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="58"  cy="88"  r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="68"  cy="100" r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="80"  cy="84"  r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="90"  cy="100" r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="100" cy="86"  r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="110" cy="100" r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="120" cy="88"  r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>
    <circle cx="130" cy="90"  r="3.5" fill="url(#suctionGrad)" opacity="0.85"/>

    <!-- ── EYES ── -->
    <!-- Left eye white -->
    <ellipse cx="70" cy="48" rx="11" ry="12" fill="white" filter="url(#eyeGlow)"/>
    <!-- Left iris -->
    <ellipse cx="71" cy="49" rx="7"  ry="8"  fill="#1D3557"/>
    <!-- Left pupil highlight (large, cute) -->
    <ellipse cx="73" cy="46" rx="2.8" ry="3.2" fill="white"/>
    <!-- Left eye tiny secondary shine -->
    <circle  cx="68" cy="52" r="1.2" fill="white" opacity="0.7"/>

    <!-- Right eye white -->
    <ellipse cx="100" cy="48" rx="11" ry="12" fill="white" filter="url(#eyeGlow)"/>
    <!-- Right iris -->
    <ellipse cx="99"  cy="49" rx="7"  ry="8"  fill="#1D3557"/>
    <!-- Right pupil highlight -->
    <ellipse cx="97"  cy="46" rx="2.8" ry="3.2" fill="white"/>
    <!-- Right eye tiny secondary shine -->
    <circle  cx="102" cy="52" r="1.2" fill="white" opacity="0.7"/>

    <!-- ── CUTE SMILE ── -->
    <!-- Simple curved smile line -->
    <path d="M 78,64 Q 85,70 92,64"
          fill="none" stroke="#9B1B28" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Cheek blush (left) -->
    <ellipse cx="64" cy="62" rx="6" ry="3.5" fill="#FF8080" opacity="0.45"/>
    <!-- Cheek blush (right) -->
    <ellipse cx="106" cy="62" rx="6" ry="3.5" fill="#FF8080" opacity="0.45"/>

    <!-- ── LITTLE HORNS / EARS (subtle octopus bumps on top) ── -->
    <ellipse cx="70" cy="22" rx="6" ry="5" fill="#E63946"/>
    <ellipse cx="100" cy="22" rx="6" ry="5" fill="#E63946"/>
    <!-- Horn highlights -->
    <ellipse cx="68" cy="20" rx="3" ry="2" fill="#FF8080" opacity="0.5"/>
    <ellipse cx="98" cy="20" rx="3" ry="2" fill="#FF8080" opacity="0.5"/>

  </g>
  <!-- end octopus -->

  <!-- ======== "OctiClaw" WORDMARK ======== -->
  <!-- Vertical separator line -->
  <line x1="168" y1="22" x2="168" y2="98" stroke="#1D3557" stroke-width="1.5" opacity="0.15"/>

  <g id="wordmark" transform="translate(182, 0)">
    <!-- "Octi" -->
    <text x="0" y="72"
          font-family="'Segoe UI', 'Inter', 'SF Pro Display', Arial, sans-serif"
          font-size="40" font-weight="800" letter-spacing="-1"
          fill="#1D3557">Octi</text>

    <!-- "Claw" in brand red -->
    <text x="86" y="72"
          font-family="'Segoe UI', 'Inter', 'SF Pro Display', Arial, sans-serif"
          font-size="40" font-weight="800" letter-spacing="-1"
          fill="#E63946">Claw</text>

    <!-- Subtitle tagline -->
    <text x="1" y="92"
          font-family="'Segoe UI', Arial, sans-serif"
          font-size="11" font-weight="400" letter-spacing="3.5"
          fill="#00D4C8" opacity="0.90">AI AGENT</text>
  </g>

</svg>
